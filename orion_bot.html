<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Orion Bot</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: #f8f9fa;
        }
        
        .app-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #fff;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        #welcome-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
        }

        #chat-screen {
            display: none;
            flex: 1;
            flex-direction: column;
            background-color: #f8f9fa;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .message {
            margin-bottom: 15px;
            max-width: 85%;
        }

        .bot-message {
            background: #e9ecef;
            padding: 12px 16px;
            border-radius: 18px 18px 18px 0;
            align-self: flex-start;
        }

        .user-message {
            background: #764ba2;
            color: white;
            padding: 12px 16px;
            border-radius: 18px 18px 0 18px;
            align-self: flex-end;
            margin-left: auto;
        }

        .chat-input-area {
            padding: 15px;
            background: white;
            border-top: 1px solid #dee2e6;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- Welcome Screen -->
        <div id="welcome-screen" class="gradient-bg">
            <div class="text-center">
                <div class="mb-4">
                    <svg width="100" height="100" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/><circle cx="9" cy="11" r="1.5"/><circle cx="15" cy="11" r="1.5"/><path d="M12 17.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/></svg>
                </div>
                <h1 class="display-5 fw-bold mb-2">Hello, I'm Orion Bot</h1>
                <p class="lead mb-5">How can I help you today?</p>
                <button id="start-btn" class="btn btn-light btn-lg rounded-pill px-5 text-primary fw-bold shadow">Get Started</button>
            </div>
        </div>

        <!-- Chat Screen -->
        <div id="chat-screen">
            <header class="navbar navbar-light bg-white shadow-sm p-3">
                <div class="container-fluid">
                    <span class="navbar-brand fw-bold text-primary">Orion Bot</span>
                    <button id="close-btn" class="btn btn-sm btn-outline-secondary rounded-circle">X</button>
                </div>
            </header>

            <div id="chat-messages" class="chat-messages d-flex flex-column">
                <!-- Messages will appear here -->
                <div class="message bot-message">Hi! I'm Orion Bot. How can I assist you?</div>
            </div>

            <div class="chat-input-area">
                <div class="input-group">
                    <input type="text" id="user-input" class="form-control rounded-pill border-0 bg-light" placeholder="Type a message...">
                    <button id="send-btn" class="btn btn-primary rounded-pill ms-2">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const welcomeScreen = document.getElementById('welcome-screen');
        const chatScreen = document.getElementById('chat-screen');
        const startBtn = document.getElementById('start-btn');
        const closeBtn = document.getElementById('close-btn');
        const sendBtn = document.getElementById('send-btn');
        const userInput = document.getElementById('user-input');
        const chatMessages = document.getElementById('chat-messages');

        // Navigation
        startBtn.addEventListener('click', () => {
            welcomeScreen.style.display = 'none';
            chatScreen.style.display = 'flex';
        });

        closeBtn.addEventListener('click', () => {
            chatScreen.style.display = 'none';
            welcomeScreen.style.display = 'flex';
        });

        // Chat logic
        async function fetchResponse(message) {
            const url = `https://text.pollinations.ai/${encodeURIComponent(message)}`;
            try {
                const response = await fetch(url);
                return await response.text();
            } catch (err) {
                return "Sorry, something went wrong. Could you try again?";
            }
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // Display user message
            chatMessages.innerHTML += `<div class="message user-message">${text}</div>`;
            userInput.value = '';
            chatMessages.scrollTop = chatMessages.scrollHeight;

            // Fetch bot reply
            const reply = await fetchResponse(text);
            chatMessages.innerHTML += `<div class="message bot-message">${reply}</div>`;
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
